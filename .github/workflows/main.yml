name: Flask CI/CD DevSecOps

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_mysql_root
          MYSQL_DATABASE: imdb_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pci_mysql_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # -------------------------------
      # 1. Checkout Code
      # -------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # 2. Setup Python
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------------
      # 3. Install Dependencies
      # -------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit pytest

      # -------------------------------
      # 4. SAST (Bandit)
      # -------------------------------
      - name: Run SAST
        run: bandit -r . --exclude ./tests -s B101

      # -------------------------------
      # 5. SCA (pip-audit)
      # -------------------------------
      - name: Run SCA
        run: |
          pip install --upgrade pip-audit
          pip-audit --ignore-vuln CVE-2026-4539

      # -------------------------------
      # 6. Unit Tests
      # -------------------------------
      - name: Run Unit Tests
        run: pytest

      # -------------------------------
      # 7. Login to DockerHub
      # -------------------------------
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------------
      # 8. Build Docker Image
      # -------------------------------
      - name: Build Docker Image
        run: docker build -t waiaung22123/myapp2 .

      # -------------------------------
      # 9. Container Scan (Trivy)
      # -------------------------------
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "waiaung22123/myapp2"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      # -------------------------------
      # 10. Push to DockerHub
      # -------------------------------
      - name: Push to DockerHub
        run: docker push waiaung22123/myapp2

      # -------------------------------
      # 11. Run Container (for DAST)
      # -------------------------------
      - name: Run Container
        run: |
          docker run -d -p 5000:5000 --name myapp2 \
            --add-host=host.docker.internal:host-gateway \
            -e DB_URI=mysql+pymysql://root:ci_mysql_root@host.docker.internal:3306/imdb_db \
            waiaung22123/myapp2

      # -------------------------------
      # 12. DAST (OWASP ZAP)
      # -------------------------------
      - name: DAST Scan
        run: |
          # Wait for the server to be ready
          curl -sf --retry 10 --retry-delay 3 --retry-connrefused http://127.0.0.1:5000/ || exit 1
          
          # Run ZAP and allow it to return exit code 1 without failing the whole job
          docker run --rm --network host \
            -v "${{ github.workspace }}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:5000 -r zap-report.html || [ $? -ne 3 ]

      # -------------------------------
      # 13. Upload ZAP Report
      # -------------------------------
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

      # -------------------------------
      # 14. Cleanup
      # -------------------------------
      - name: Cleanup
        if: always()
        run: |
          docker stop myapp2 || true
          docker rm myapp2 || true
