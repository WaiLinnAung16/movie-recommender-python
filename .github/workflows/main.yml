name: Flask CI/CD - DevSecOps 
 
on: 
  push: 
    branches: [ main ] 
 
jobs: 
  build-test-deploy: 
    runs-on: ubuntu-latest 
     
    # --- 1. Launch MySQL Database for the Scan --- 
    services: 
      mysql: 
        image: mysql:8.0 
        env: 
          MYSQL_ROOT_PASSWORD: root 
          MYSQL_DATABASE: imdb_db 
        ports: 
          - 3306:3306 
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3 
 
    env: 
      IMAGE_NAME: myapp3 
      # Tell Flask to connect to the MySQL service on the runner host 
      DB_URI: "mysql+pymysql://root:root@127.0.0.1:3306/imdb_db" 
 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 
 
      - name: Setup Python 
        uses: actions/setup-python@v5 
        with: 
          python-version: '3.11' 
 
      - name: Install dependencies 
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt bandit pip-audit pytest pymysql 
      - name: Run SAST (Bandit) 
        run: bandit -r . --exclude ./tests -s B101,B104 --quiet 
 
      - name: Run Unit Tests 
        run: pytest || echo "No tests found, skipping..." 
       
      - name: Log in to DockerHub 
        uses: docker/login-action@v3 
        with: 
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }} 
 
      - name: Build and Tag Image 
        run: | 
          CLEAN_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr -d '\r\n ') 
          FULL_TAG="$CLEAN_USER/${{ env.IMAGE_NAME }}:latest" 
          docker build -t "$FULL_TAG" . 
          echo "FULL_IMAGE_TAG=$FULL_TAG" >> $GITHUB_ENV 
 
      - name: Scan Docker Image (Trivy) 
        uses: aquasecurity/trivy-action@master 
        with: 
          image-ref: ${{ env.FULL_IMAGE_TAG }} 
          format: 'table' 
          exit-code: '0' 
          severity: 'CRITICAL,HIGH' 
   
      - name: Push to DockerHub 
        run: docker push "${{ env.FULL_IMAGE_TAG }}" 
         
      - name: Run Container for DAST 
        run: | 
          # We pass the DB_URI to the container so it can find the MySQL service 
          docker run -d -p 5000:5000 \ 
            --name myapp3 \ 
            --network="host" \ 
            -e DB_URI="${{ env.DB_URI }}" \ 
            "${{ env.FULL_IMAGE_TAG }}" 
           
          echo "Waiting for ETL to finish (this takes a moment)..." 
          sleep 30  
          docker logs myapp3 
          curl -v http://localhost:5000 || echo "App not responding yet" 
 
      - name: DAST Scan (OWASP ZAP) 
        run: | 
          mkdir -p zap-reports 
          chmod 777 zap-reports 
          docker run --network="host" \ 
            -v $(pwd)/zap-reports:/zap/wrk:rw \ 
            ghcr.io/zaproxy/zaproxy:stable \ 
            zap-baseline.py \ 
            -t http://localhost:5000 \ 
            -r zap-report.html || echo "ZAP finished with alerts" 
 
      - name: Upload ZAP Report 
        uses: actions/upload-artifact@v4 
        if: always() 
        with: 
          name: zap-report 
          path: zap-reports/zap-report.html 
 
      - name: Cleanup 
        if: always() 
        run: | 
          docker stop myapp3 || true 
          docker rm myapp3 || true 