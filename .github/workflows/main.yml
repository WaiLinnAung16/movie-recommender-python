name: Flask CI/CD

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit pytest

      - name: Run SAST
        run: bandit -r . --exclude ./tests -s B101 --quiet

      # - name: Run SCA
      #   run: |
      #     pip-audit --severity high critical --exit-code 0 || \
      #     if [ $? -eq 1 ]; then exit 1; else exit 0; fi
      #   # This will only fail for high/critical severity vulnerabilities

      - name: Run Unit Tests
        run: pytest

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: docker build -t myapp2 .

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/myapp2"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Push to DockerHub
        run: |
          docker build -t waiaung22123/myapp2 .
          docker push waiaung22123/myapp2

      # -------------------------------
      # 11. Run Container (for DAST)
      # -------------------------------
      - name: Run Container
        run: docker run -d -p 5000:5000 --name myapp2 waiaung22123/myapp2

      # -------------------------------
      # 12. DAST (OWASP ZAP)
      # -------------------------------
      - name: DAST Scan
        run: |
          docker run --network="host" owasp/zap2docker-stable \
          zap-baseline.py -t http://localhost:5000 -r zap-report.html

      # -------------------------------
      # 13. Upload ZAP Report
      # -------------------------------
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: zap-report.html

      # -------------------------------
      # 14. Cleanup
      # -------------------------------
      - name: Cleanup
        run: |
          docker stop myapp2 || true
          docker rm myapp2 || true
